<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Intergalactic Cargo Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f9fafb;
        }

        h2 {
            margin-bottom: 10px;
        }

        button {
            padding: 10px 15px;
            font-size: 16px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background-color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background-color: #f1f1f1;
        }
    </style>
</head>

<body>

<h2>Intergalactic Cargo Dashboard</h2>

<button id="syncBtn">Sync Data</button>

<table>
    <thead>
        <tr>
            <th>Date</th>
            <th>Cargo ID</th>
            <th>Weight</th>
            <th>Destination</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<script>
const API_URL = "http://127.0.0.1:5000/api/cargo";

// Fetch and display data
async function fetchData() {
    try {
        const response = await fetch(API_URL);
        const data = await response.json();

        // ✅ Sorting rule
        data.sort((a, b) => {
            if (a.destination === "Earth") return 1;
            if (b.destination === "Earth") return -1;
            return b.weight - a.weight;
        });

        const tableBody = document.getElementById("tableBody");
        tableBody.innerHTML = "";

        data.forEach(item => {
            const row = `
                <tr>
                    <td>${item.date}</td>
                    <td>${item.cargo_id}</td>
                    <td>${item.weight}</td>
                    <td>${item.destination}</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });

    } catch (error) {
        console.error("Error fetching data:", error);
    }
}


// ✅ Sync button logic
document.getElementById("syncBtn").addEventListener("click", async function () {

    const btn = this;

    btn.disabled = true;
    btn.innerText = "Aligning quantum drives...";

    await fetchData();

    setTimeout(() => {
        btn.disabled = false;
        btn.innerText = "Sync Data";
    }, 2500); // EXACT 2.5 seconds

});

// Load data initially
fetchData();

</script>

</body>
</html>
